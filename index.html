<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mafia Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div id="fade" class="fade"></div>

    <div class="topbar">
      <div id="testInfo" class="testinfo"></div>
      <div class="top-actions">
        <button id="nextPlayerBtn" class="icon-btn" aria-label="Następny gracz">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M5 19c1.8-3 4-4.5 7-4.5s5.2 1.5 7 4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button id="skipPhaseBtn" class="icon-btn skip-btn" aria-label="Pomiń rundę">s</button>
        <button id="settingsBtn" class="icon-btn" aria-label="Ustawienia">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13.5v-3l-2-.6a5.6 5.6 0 0 0-.5-1.2l1-1.8-2.1-2.1-1.8 1a5.6 5.6 0 0 0-1.2-.5l-.6-2h-3l-.6 2a5.6 5.6 0 0 0-1.2.5l-1.8-1-2.1 2.1 1 1.8a5.6 5.6 0 0 0-.5 1.2l-2 .6v3l2 .6a5.6 5.6 0 0 0 .5 1.2l-1 1.8 2.1 2.1 1.8-1a5.6 5.6 0 0 0 1.2.5l.6 2h3l.6-2a5.6 5.6 0 0 0 1.2-.5l1.8 1 2.1-2.1-1-1.8a5.6 5.6 0 0 0 .5-1.2z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.2" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button id="resetBtn" class="icon-btn" aria-label="Reset">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12a7 7 0 1 1-2.1-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M19 5v4h-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div id="screen" class="screen"></div>

    <div id="joinModal" class="modal">
      <div class="modal-card">
        <div class="modal-title">Dołącz do gry</div>
        <input id="joinNameInput" class="input" placeholder="Nazwa" />
        <div class="modal-actions">
          <button id="joinAddBtn" class="primary">Dodaj</button>
        </div>
      </div>
    </div>

    <div id="settingsModal" class="modal">
      <div class="modal-card">
        <div class="modal-title">Ustawienia</div>
        <div id="settingsGrid" class="settings-grid"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
